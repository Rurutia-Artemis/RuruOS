<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ruru 模板 · 起步骨架</title>
<!--
  ============================================================
  糖霜模板（软糖手账风格）· 起步骨架 v1 · 2026-07-11 拍板
  用法：复制本文件为新页面起点，内容写进 <main>，
  组件类直接用（.pill / .jelly / .icon-round / .canvas / .act-tag），
  不要新发明按钮样式。规范全文见同目录 README.md。
  ============================================================
-->
<style>
:root {
  --berry: #ff8fab; --peach: #ffab76; --butter: #ffd66b;
  --mint: #6fd8b4; --sky: #7db8f7; --taro: #b9a5f5;
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --display: 'Yuanti SC', 'Hiragino Maru Gothic ProN', 'PingFang SC', sans-serif;
  --sans: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
}
/* —— 六套主题底（禁改 hex，可整套增删）—— */
body[data-theme="cream"] { color-scheme: light; --bg:#faf3ea; --bg2:#f3e6dd; --card:rgba(255,255,255,0.78); --card-bd:rgba(216,180,150,0.35); --ink:#4a3b33; --muted:#a5907f; --line:rgba(180,140,110,0.18); --frost:rgba(255,255,255,0.62); --frost-bd:rgba(190,150,120,0.3); --input:rgba(255,252,246,0.9); --sticker:#4a3427; --shadow:0 16px 40px rgba(160,120,80,0.16); --note-bg:color-mix(in srgb, var(--butter) 9%, #fffdf8); --note-bd:color-mix(in srgb, var(--butter) 45%, transparent); }
body[data-theme="matcha"] { color-scheme: light; --bg:#eef4e4; --bg2:#e2ecd4; --card:rgba(255,255,255,0.8); --card-bd:rgba(160,190,130,0.35); --ink:#3e4a33; --muted:#8ba07a; --line:rgba(130,160,100,0.2); --frost:rgba(255,255,255,0.62); --frost-bd:rgba(140,175,110,0.32); --input:rgba(253,255,248,0.9); --sticker:#384a2c; --shadow:0 16px 40px rgba(110,140,80,0.15); --note-bg:color-mix(in srgb, var(--butter) 9%, #fdfff6); --note-bd:color-mix(in srgb, var(--mint) 40%, transparent); }
body[data-theme="soda"] { color-scheme: light; --bg:#e9f3f8; --bg2:#dcebf4; --card:rgba(255,255,255,0.8); --card-bd:rgba(130,175,205,0.35); --ink:#35464e; --muted:#7d99a8; --line:rgba(100,150,180,0.2); --frost:rgba(255,255,255,0.62); --frost-bd:rgba(110,160,195,0.32); --input:rgba(250,253,255,0.9); --sticker:#2d434f; --shadow:0 16px 40px rgba(80,130,160,0.15); --note-bg:color-mix(in srgb, var(--butter) 8%, #fbfdff); --note-bd:color-mix(in srgb, var(--sky) 40%, transparent); }
body[data-theme="peachtea"] { color-scheme: light; --bg:#fdeee4; --bg2:#f8e0d2; --card:rgba(255,255,255,0.8); --card-bd:rgba(225,165,130,0.38); --ink:#4e3a30; --muted:#b08c78; --line:rgba(200,140,105,0.2); --frost:rgba(255,255,255,0.62); --frost-bd:rgba(210,150,115,0.32); --input:rgba(255,251,247,0.9); --sticker:#4c3126; --shadow:0 16px 40px rgba(180,110,70,0.15); --note-bg:color-mix(in srgb, var(--butter) 9%, #fffbf6); --note-bd:color-mix(in srgb, var(--peach) 45%, transparent); }
body[data-theme="berrynight"] { color-scheme: dark; --bg:#2f2358; --bg2:#241a49; --card:rgba(255,255,255,0.11); --card-bd:rgba(255,190,220,0.26); --ink:#f7eefa; --muted:#beb0d8; --line:rgba(255,190,220,0.18); --frost:rgba(255,255,255,0.10); --frost-bd:rgba(255,255,255,0.18); --input:rgba(12,8,24,0.45); --sticker:#43273a; --shadow:0 18px 44px rgba(8,4,18,0.5); --note-bg:color-mix(in srgb, var(--butter) 13%, rgba(255,255,255,0.10)); --note-bd:color-mix(in srgb, var(--butter) 38%, transparent); }
body[data-theme="grapenight"] { color-scheme: dark; --bg:#251c3e; --bg2:#1b1430; --card:rgba(255,255,255,0.10); --card-bd:rgba(200,180,255,0.24); --ink:#f2edfa; --muted:#a99cc9; --line:rgba(200,180,255,0.17); --frost:rgba(255,255,255,0.10); --frost-bd:rgba(255,255,255,0.17); --input:rgba(10,7,20,0.45); --sticker:#3a2a4e; --shadow:0 18px 44px rgba(5,3,14,0.55); --note-bg:color-mix(in srgb, var(--butter) 12%, rgba(255,255,255,0.09)); --note-bd:color-mix(in srgb, var(--butter) 35%, transparent); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  /* v7.0：渐变禁用 fixed attachment——Artifact/iframe 里会断层露白 */
  background: linear-gradient(176deg, var(--bg) 0%, var(--bg2) 100%);
  background-color: var(--bg);
  min-height: 100vh;
  color: var(--ink); font-family: var(--sans);
  font-size: 16px; line-height: 1.7; padding-bottom: 80px;
  transition: background 0.5s ease, color 0.5s ease;
}
button { font-family: var(--sans); cursor: pointer; }
button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2.5px solid var(--sky); outline-offset: 2px; }

/* ============ 粒子层（樱花/细雨/落雪/萤火，三项可调） ============ */
.fx { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; filter: saturate(var(--sat, 1)); }
.fx i { position: absolute; display: block; top: -8vh; left: var(--x); animation: fxfall var(--d) linear var(--dl) infinite; opacity: calc(var(--pvis, 0.85) * var(--vis, 1)); }
.fx i > b { display: block; animation: fxsway calc(var(--d) / 3.2) ease-in-out var(--dl) infinite alternate; }
/* --dx = 整程横向漂移量（方向角驱动），--tilt = 雨丝倾角 */
@keyframes fxfall { to { transform: translate(var(--dx, 0px), 118vh); } }
@keyframes fxsway { from { transform: translateX(calc(var(--sw) * -1)) rotate(0deg); } to { transform: translateX(var(--sw)) rotate(200deg); } }
.fx .petal { --pvis: 0.85; }
.fx .petal > b { width: var(--s); height: calc(var(--s) * 0.86); background: linear-gradient(135deg, #ffc7d6, var(--berry) 70%); border-radius: 68% 6% 68% 6%; }
.fx .rain { --pvis: 0.6; }
.fx .rain > b { width: 1.5px; height: 22px; animation: none; background: linear-gradient(180deg, transparent, var(--sky)); transform: rotate(var(--tilt, 9deg)); }
.fx .snow { --pvis: 0.85; }
.fx .snow > b { width: var(--s); height: var(--s); border-radius: 50%; background: #fff; filter: blur(0.6px); box-shadow: 0 0 6px rgba(255,255,255,0.6); }
.fx .fly { --pvis: 1; top: auto; bottom: -4vh; animation-name: fxrise; }
/* 浅色主题下粒子加深一档，否则白雪浅雨贴在奶油底上隐形 */
body:not([data-theme*="night"]) .fx .rain > b { background: linear-gradient(180deg, transparent, #4d90d8); }
body:not([data-theme*="night"]) .fx .snow > b { background: #c9dced; box-shadow: 0 0 6px rgba(110,155,200,0.55); }
body:not([data-theme*="night"]) .fx .fly > b { background: #f0b23c; box-shadow: 0 0 12px 3px rgba(225,150,35,0.55); }
@keyframes fxrise { to { transform: translate(var(--dx, 0px), -118vh); } }
.fx .fly > b { width: var(--s); height: var(--s); border-radius: 50%; background: var(--butter); box-shadow: 0 0 12px 3px rgba(255,214,107,0.55); animation: fxsway calc(var(--d)/3) ease-in-out infinite alternate, fxflick 2.4s ease-in-out var(--dl) infinite alternate; }
@keyframes fxflick { from { opacity: 0.15; } to { opacity: 0.9; } }
@media (prefers-reduced-motion: reduce) { .fx { display: none; } * { animation-duration: 0.01s !important; transition-duration: 0.01s !important; } }

/* ============ 组件：糖霜胶囊 ============ */
.pill {
  border: 1.5px solid color-mix(in srgb, var(--pc, var(--peach)) 45%, transparent);
  background: color-mix(in srgb, var(--pc, var(--peach)) 16%, var(--frost));
  color: var(--ink); border-radius: 12px; padding: 8px 18px;
  font-size: 0.9em; font-weight: 800;
  transition: transform 0.2s var(--spring), background 0.2s ease, box-shadow 0.2s ease;
}
.pill:hover { background: color-mix(in srgb, var(--pc, var(--peach)) 28%, var(--frost)); transform: translateY(-1.5px); }
.pill:active { transform: translateY(1px) scale(0.97); }
.pill.on {
  background: linear-gradient(180deg, color-mix(in srgb, var(--pc, var(--peach)) 82%, #fff), var(--pc, var(--peach)));
  border-color: transparent; color: var(--sticker);
  box-shadow: 0 3px 0 color-mix(in srgb, var(--pc, var(--peach)) 55%, #7a4a20), 0 6px 14px color-mix(in srgb, var(--pc, var(--peach)) 42%, transparent);
  transform: translateY(-1.5px);
}
.pill .n { display: inline-block; min-width: 18px; text-align: center; background: rgba(255,255,255,0.4); border-radius: 8px; padding: 0 5px; font-size: 0.88em; margin-left: 4px; font-variant-numeric: tabular-nums; }
.pill.on .n { background: rgba(255,255,255,0.55); }
body[data-theme*="night"] .pill .n { background: rgba(255,255,255,0.14); }
body[data-theme*="night"] .pill.on .n { background: rgba(255,255,255,0.5); }

/* ============ 组件：果冻主钮 ============ */
.jelly {
  border: none; border-radius: 15px; padding: 11px 22px;
  font-family: var(--display); font-weight: 800; font-size: 0.94em;
  color: var(--sticker);
  background: linear-gradient(180deg, color-mix(in srgb, var(--jc, var(--taro)) 86%, #fff), var(--jc, var(--taro)));
  box-shadow: 0 4px 0 color-mix(in srgb, var(--jc, var(--taro)) 58%, #6a4a30), 0 8px 18px color-mix(in srgb, var(--jc, var(--taro)) 38%, transparent);
  transition: transform 0.16s var(--spring), box-shadow 0.16s ease;
}
.jelly:hover { transform: translateY(-2px); }
.jelly:active { transform: translateY(3px) scale(0.97); box-shadow: 0 1px 0 color-mix(in srgb, var(--jc, var(--taro)) 58%, #6a4a30); }
.jelly:disabled { filter: saturate(0.25) opacity(0.55); transform: none; box-shadow: none; cursor: not-allowed; }
.jc-berry { --jc: var(--berry); } .jc-peach { --jc: var(--peach); } .jc-butter { --jc: var(--butter); }
.jc-mint { --jc: var(--mint); } .jc-sky { --jc: var(--sky); } .jc-taro { --jc: var(--taro); }

/* ============ 组件：图标圆钮 / 卡片 / 贴纸标签 / 便利贴 ============ */
.icon-round { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--frost-bd); background: var(--frost); color: var(--ink); font-size: 1em; font-weight: 800; display: inline-grid; place-items: center; transition: transform 0.2s var(--spring), background 0.2s ease; }
.icon-round:hover { transform: scale(1.1) rotate(-4deg); background: color-mix(in srgb, var(--frost) 55%, rgba(255,255,255,0.5)); }
/* 方章功能钮（v7.0 质感定稿）：65px 果冻方章，--bc 传色；图标必须手绘 SVG 40px，字符/emoji 禁 */
.stamp {
  position: relative; overflow: hidden;
  width: 65px; height: 65px; border-radius: 18px; border: none;
  display: inline-grid; place-items: center;
  background: linear-gradient(180deg, color-mix(in srgb, var(--bc, var(--taro)) 86%, #fff), var(--bc, var(--taro)));
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.55),
    inset 0 -5px 10px color-mix(in srgb, var(--bc, var(--taro)) 62%, #7a4630),
    0 4px 0 color-mix(in srgb, var(--bc, var(--taro)) 58%, #6a4a30),
    0 9px 20px color-mix(in srgb, var(--bc, var(--taro)) 42%, transparent);
  transition: transform 0.18s var(--spring);
}
.stamp::before {
  content: ''; position: absolute; left: 7px; right: 7px; top: 4px; height: 34%;
  border-radius: 10px 10px 46% 46%;
  background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
  pointer-events: none;
}
.stamp:hover { transform: translateY(-3px); }
.stamp:active { transform: translateY(2px) scale(0.96); }
.stamp svg { width: 40px; height: 40px; display: block; }
/* 渐变名牌字（v7.0 拍板）：两行名牌制——上行 .grad-hello 小字，下行 .grad-name 糖果渐变大字 */
.grad-hello { display: block; font-size: 1.02em; font-weight: 800; color: var(--muted); letter-spacing: 0.06em; }
.grad-name {
  display: inline-block; font-family: var(--display); font-weight: 800;
  font-size: 2.7em; line-height: 1.15; letter-spacing: 0.02em;
  background: linear-gradient(118deg, var(--berry), var(--peach) 48%, var(--taro));
  -webkit-background-clip: text; background-clip: text;
  color: transparent; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 3px 12px color-mix(in srgb, var(--berry) 30%, transparent));
}
/* 参数弹层：调节项多于两个时收进一颗按钮，点开这个面板 */
.pop { position: absolute; top: calc(100% + 12px); right: 0; z-index: 1002; width: 308px; padding: 16px 18px 14px; background: var(--card); border: 1.5px solid var(--card-bd); border-radius: 20px; box-shadow: var(--shadow); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); transform-origin: top right; animation: popin 0.28s var(--spring); }
@keyframes popin { from { opacity: 0; transform: scale(0.92) translateY(-6px); } }
.pop.is-hidden { display: none; }
.pop-title { font-family: var(--display); font-weight: 800; font-size: 0.96em; margin-bottom: 10px; }
.pop-row { display: flex; align-items: center; gap: 10px; margin: 9px 0; }
.pop-row label { flex: 0 0 32px; font-size: 0.74em; font-weight: 800; letter-spacing: 0.08em; color: var(--muted); }
.pop-row input[type="range"] { flex: 1; accent-color: var(--berry); }
.pop-row .val { flex: 0 0 44px; text-align: right; font-size: 0.76em; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; }
.canvas { background: var(--card); border: 1.5px solid var(--card-bd); border-radius: 26px; box-shadow: var(--shadow); padding: clamp(18px, 3vw, 32px); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
.act-tag { display: inline-flex; align-items: center; gap: 8px; font-family: var(--display); font-weight: 800; font-size: 1.06em; background: var(--card); border: 1.5px solid var(--card-bd); border-radius: 14px 14px 14px 4px; padding: 8px 18px; box-shadow: var(--shadow); transform: rotate(-1deg); margin-bottom: 6px; }
.act-tag em { font-style: normal; font-size: 0.72em; font-weight: 800; color: var(--sticker); background: var(--tag, var(--butter)); border-radius: 7px; padding: 2px 9px; }
.note { padding: 12px 16px; background: var(--note-bg); border: 1.5px dashed var(--note-bd); border-radius: 16px; transform: rotate(-0.3deg); }
.stage { max-width: 1240px; margin: 0 auto; padding: 0 clamp(16px, 4vw, 44px); }
h1, h2, h3 { font-family: var(--display); font-weight: 800; letter-spacing: 0.01em; text-wrap: balance; }
.muted { color: var(--muted); }
.num { font-variant-numeric: tabular-nums; }

/* ============ 主题切换条 ============ */
.bar { position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; flex-wrap: wrap; gap: 10px 18px; padding: 12px clamp(16px, 4vw, 44px); background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-bottom: 1.5px dashed var(--line); }
.bar-label { font-size: 0.72em; font-weight: 800; letter-spacing: 0.12em; color: var(--muted); }
.swatch { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; padding: 0; background: var(--sw); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55); transition: transform 0.25s var(--spring); }
.swatch:hover { transform: scale(1.15); }
.swatch.on { border-color: var(--ink); transform: scale(1.12); }
</style>
</head>
<body data-theme="cream">

<div class="fx" id="fx" aria-hidden="true"></div>

<header class="bar">
  <strong style="font-family:var(--display)">
    <svg viewBox="0 0 48 48" style="width:26px; vertical-align:-7px; margin-right:6px"><defs><linearGradient id="gB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8fab"/><stop offset="1" stop-color="#b9a5f5"/></linearGradient></defs><rect x="2" y="2" width="44" height="44" rx="14" fill="url(#gB)"/><ellipse cx="17" cy="11" rx="9" ry="4.5" fill="#fff" opacity="0.36" transform="rotate(-14 17 11)"/><text x="24" y="34.5" text-anchor="middle" font-family="Yuanti SC, Hiragino Maru Gothic ProN, sans-serif" font-size="29" font-weight="800" fill="#fff">R</text></svg>
    页面标题写这里
  </strong>
  <span class="bar-label">主题</span>
  <span id="themePick">
    <button class="swatch on" data-t="cream" style="--sw:#faf3ea" title="奶油白天"></button>
    <button class="swatch" data-t="matcha" style="--sw:#e4eed2" title="抹茶拿铁"></button>
    <button class="swatch" data-t="soda" style="--sw:#d9ecf6" title="海盐汽水"></button>
    <button class="swatch" data-t="peachtea" style="--sw:#fbe3d2" title="蜜桃乌龙"></button>
    <button class="swatch" data-t="berrynight" style="--sw:#2f2358" title="莓果夜晚"></button>
    <button class="swatch" data-t="grapenight" style="--sw:#1e1633" title="葡萄夜巡"></button>
  </span>
</header>

<main class="stage">
  <!-- 组件用法示例，做新页面时整段删掉换成内容 -->
  <section style="margin-top:48px">
    <div class="act-tag" style="--tag:var(--berry)"><em>①</em>贴纸标签这样用</div>
    <div class="canvas" style="margin-top:10px">
      <p>卡片正文。糖霜胶囊：
        <button class="pill on" style="--pc:var(--peach)">选中 <span class="n">3</span></button>
        <button class="pill">未选中</button>
      </p>
      <p>果冻主钮：
        <button class="jelly jc-mint">确认</button>
        <button class="jelly jc-berry">删除</button>
        <button class="icon-round">↻</button>
      </p>
      <p style="display:flex; align-items:center; gap:14px">方章功能钮（v7.0 定稿三图标，SVG 可直接复用）：
        <button class="stamp" style="--bc:var(--sky)" title="同步" aria-label="同步"><svg viewBox="0 0 24 24" fill="none" stroke="#26466a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 12 a7.1 7.1 0 0 1 12.2 -5"/><path d="M17.4 3.7 v3.7 h-3.7"/><path d="M19.1 12 a7.1 7.1 0 0 1 -12.2 5"/><path d="M6.6 20.3 v-3.7 h3.7"/><circle cx="12" cy="12" r="1.7" fill="#26466a" stroke="none"/></svg></button>
        <button class="stamp" style="--bc:var(--berry)" title="动效" aria-label="动效"><svg viewBox="0 0 24 24" fill="none" stroke="#5c2438" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M0 3.4 C-1.8 1.8 -2.2 -1 -1.1 -3.2 L0 -2.1 L1.1 -3.2 C2.2 -1 1.8 1.8 0 3.4 Z" fill="#ff9fb8" transform="translate(8.5 7.5) rotate(-28) scale(1.35)"/><path d="M0 3.4 C-1.8 1.8 -2.2 -1 -1.1 -3.2 L0 -2.1 L1.1 -3.2 C2.2 -1 1.8 1.8 0 3.4 Z" fill="#ffc9d9" transform="translate(15.5 12.5) rotate(38) scale(1.05)"/><path d="M0 3.4 C-1.8 1.8 -2.2 -1 -1.1 -3.2 L0 -2.1 L1.1 -3.2 C2.2 -1 1.8 1.8 0 3.4 Z" fill="#ffdde8" transform="translate(9.5 17.8) rotate(78) scale(0.8)"/><path d="M15 4.6 q2.8 -0.9 4.6 0.5" opacity="0.55"/><path d="M15.8 19.4 q2.4 0.9 4.2 -0.4" opacity="0.55"/></svg></button>
        <button class="stamp" style="--bc:var(--butter)" title="主题" aria-label="主题"><svg viewBox="0 0 24 24" fill="none" stroke="#5c4420" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.6 a8.4 8.4 0 1 0 0.2 16.8 c1.9 0 2.5 -1.2 2 -2.4 c-0.7 -1.5 0.3 -2.9 2 -2.9 h1.4 a3.5 3.5 0 0 0 3 -5.1 A8.4 8.4 0 0 0 12 3.6 Z" fill="#fff8e6"/><circle cx="8.1" cy="9.2" r="1.5" fill="#ff8fab" stroke="none"/><circle cx="12.4" cy="7.3" r="1.5" fill="#7db8f7" stroke="none"/><circle cx="16.2" cy="9.4" r="1.5" fill="#6fd8b4" stroke="none"/><circle cx="7.5" cy="13.6" r="1.5" fill="#b9a5f5" stroke="none"/></svg></button>
      </p>
      <p>渐变名牌字（两行名牌制）：</p>
      <p style="line-height:1.2; margin-top:0">
        <span class="grad-hello">早上好 ☀︎ 清晨拾光</span>
        <span class="grad-name">HOSHIZAWA</span>
      </p>
      <div class="note">便利贴：奶油微黄底，跟主题自动联动。</div>
    </div>
  </section>
</main>

<script>
/* 主题切换 */
const body = document.body;
body.dataset.theme = body.dataset.theme || 'cream'; /* 兜底：宿主没给 body 挂主题时用奶油 */
document.getElementById('themePick').addEventListener('click', e => {
  const b = e.target.closest('.swatch'); if (!b) return;
  body.dataset.theme = b.dataset.t;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('on', s === b));
});
/* 粒子层：mode = none|sakura|rain|snow|fly；speed/count/size/sat/vis 均 0.3~2 乘子，angle 方向角 -45~45（负=左斜）；sat/vis 是层级变量改后即时生效 */
const fxHost = document.getElementById('fx');
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const fxState = { mode: 'sakura', speed: 1, count: 1, size: 1, angle: 10, sat: 1, vis: 1 };
function spawnFx() {
  fxHost.innerHTML = '';
  fxHost.style.setProperty('--sat', fxState.sat);
  fxHost.style.setProperty('--vis', fxState.vis);
  if (reduced || fxState.mode === 'none') return;
  const cfg = { sakura: ['petal', 22], rain: ['rain', 38], snow: ['snow', 26], fly: ['fly', 14] }[fxState.mode];
  if (!cfg) return;
  const [cls, base] = cfg;
  const n = Math.max(4, Math.round(base * fxState.count));
  const drift = Math.tan(fxState.angle * Math.PI / 180) * 118 * (cls === 'fly' ? -1 : 1);
  for (let i = 0; i < n; i++) {
    const el = document.createElement('i');
    el.className = cls;
    const d = (cls === 'rain' ? 0.9 + Math.random() * 0.6 : 8 + Math.random() * 9) / fxState.speed;
    const s = (cls === 'snow' ? 4 + Math.random() * 4 : cls === 'fly' ? 4 + Math.random() * 3 : 10 + Math.random() * 8) * fxState.size;
    const pad = Math.min(45, Math.abs(drift));
    const x = -pad * (drift > 0 ? 1 : 0) + Math.random() * (100 + pad);
    el.style.setProperty('--x', x.toFixed(1) + 'vw');
    el.style.setProperty('--d', d.toFixed(2) + 's');
    el.style.setProperty('--dl', (-Math.random() * d).toFixed(2) + 's');
    el.style.setProperty('--s', s.toFixed(1) + 'px');
    el.style.setProperty('--sw', (14 + Math.random() * 26).toFixed(0) + 'px');
    el.style.setProperty('--dx', drift.toFixed(1) + 'vh');
    el.style.setProperty('--tilt', fxState.angle.toFixed(0) + 'deg');
    el.appendChild(document.createElement('b'));
    fxHost.appendChild(el);
  }
}
spawnFx();
</script>
</body>
</html>
